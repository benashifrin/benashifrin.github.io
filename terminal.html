<div class="blog-post-title">Learnings from Religion</div>
<div class="blog-post-date">March 3, 2026</div>
<div class="blog-post-body">
<p>I was leaving a conference and sat next to someone wearing a suit on my flight. He was a Mormon on his way for his mission trip to Peru for two years. There are many Mormon founders, so I was excited to hear more about their routine and what might have caused this trend.</p>
<p><b>Rejection.</b> Mormons get rejected, a lot. They stand in the street approaching others and get constantly told no. The 19 year old I was sitting with said he gets one baptism a month. That's a lot of rejection! You have to learn how to be good at talking to others. Their job depends on it.</p>
<p><b>Routine.</b> Mormons have strict routines. They go to bed at 10:30 and wake up at 6:30 every day. They only get one day off, his was a Monday. Even their days off are controlled, they can't watch movies for the entire two years.</p>
<p><b>Sacrifice.</b> They aren't allowed to drink coffee, black tea, alcohol, use nicotine products, etc. They have to leave their phones back home and are provided phones by the church that are closely monitored. They aren't allowed to use social media and the closest they get to it are shared Google Photo links that they send to their friends to interact with each other's photos. They are only allowed to talk to their family on certain days unless it's their birthday.</p>
<p><b>Support.</b> They have medics and trained people that support them while abroad, but the man I spoke to will not be going to the dentist for two years. They are provided some goods, mostly through donations, but they expect to spend roughly $10,000 for the two years. Most of their food and housing is provided.</p>
<p><b>Appearance.</b> They are constantly dressed to impress. They make it look like what they are doing is important.</p>
<p><b>Purpose.</b> When you speak to them, they sound like they know their purpose in life. Unlike many people in their 20s. What they are doing takes tremendous sacrifice, leaving everyone they know to go somewhere to be rejected constantly.</p>
<p><b>Overall Learnings.</b> Talking to someone so different from me was a great learning experience. Our purposes felt very different but our actual structure for our lives were strangely similar. I yearn to move to SF to meet people similar to me, but on this flight I did find someone. He had a wildly different purpose, but our conviction to our calling was the same.</p>

<div class="blog-post">
<div class="blog-post-title">On Talking to Customers, GTM, and Pivot Strategy</div>
<div class="blog-post-date">March 4, 2026</div>
<div class="blog-post-body">
<p><em>This is going to be a stream of consciousness and might be mostly wrong. If so, you can email me. I am also a little sick, and that always affects my mental state.</em></p>
<p>Customer discovery, the most important thing early stage startups should be doing. At least, IMO. Selling in healthcare is not easy, just like selling any B2B. I'd say the difficulty of selling in healthcare is there isn't a LinkedIn for most doctors. There isn't a LinkedIn Sales Navigator to message every doctor in the area. They don't use LinkedIn.</p>
<p>Now, how do you talk to doctors then? I have found the best way is to ask doctors to connect you with their friends, and to make friends with them at conferences.</p>
<p>Cold outbound becomes a numbers game, and the numbers are poor. My sample size is small, but name dropping working at a nearby office gets me past 50% of the gatekeepers and then it's up to me that the decision maker will have the time to set up a meeting. This is in person as well.</p>
<p>So, what I am getting at is if it's really hard to talk to customers, and you aren't even selling anything then what percent will want to buy your product? Expanding on this point. People are generally nice, I'd say a higher percent would be nice and want to talk to you than want to buy your product.</p>
<p>I guess it's different if them speaking to you is them doing you a favor, but if your product is so good then they feel like you are helping them by selling to them?</p>
<p>Maybe it's my own insecurities, and worries about the product I am selling.</p>

<p>So taking the average, I would be able to have meetings with 80 offices. When I speak to offices a large percent, let's say 80%, says this problem isn't significant for them. So that leaves 16 offices, and half would actually buy this product at product market fit so 8 offices. My price for this product would be $200 a month max. So, $1,600. I know this is very rough, and probably very wrong.</p>

<div class="blog-email">
<div class="blog-email-header"><b>From:</b> The Investor &nbsp; <b>To:</b> Benjamin Shifrin<br><b>Subject:</b> Re: On talking to customers and GTM</div>
<div class="blog-email-body">
<p>Hey,</p>
<p>Thanks for sending this over. I read the whole thing. You asked me to email you if you were mostly wrong, so here I am.</p>
<p>You are doing what a lot of founders do, which is building a math problem to justify a feeling you already have. You wrote an entire post rationalizing a pivot before you have even done the work to invalidate the current idea. That is not rigor. That is fear dressed up as analysis.</p>
<p><b>First, your TAM math is backwards.</b> You are starting with 500 offices in your state and working down to $1,600/mo. That is not a market size problem. That is a pricing and expansion problem. If the only addressable market for your product is 500 offices in one state at $200/mo, you do not have a startup. You have a small local business. But I do not think that is actually true. I think you have not thought hard enough about whether this product could serve adjacent specialties, whether the price could be 10x higher if you solved a deeper problem, or whether you are artificially constraining the market because the current version of the product is too narrow.</p>
<p><b>Second, you are confusing difficulty of sales with weakness of product-market fit.</b> Selling to doctors is hard. You said it yourself. But you are conflating the friction of reaching them with the signal of whether they want what you are building. Those are two completely different things. Enterprise sales to hospitals is brutal and those companies are worth billions. Difficulty of access is not evidence of low demand.</p>
<p><b>Third, the design partner thing concerns me more than anything else you wrote.</b> You said you sense he is doing you a favor. That is the most important sentence in this entire post and you almost buried it. If your design partner is not pulling the product out of your hands, if he is not asking you when the next feature ships, if he is not telling colleagues about it without you asking, then you have a real problem. But the problem is not &ldquo;I need to pivot.&rdquo; The problem might be &ldquo;I built the wrong thing for the right person&rdquo; or &ldquo;I built the right thing for the wrong person.&rdquo; Have you sat down with him and asked him directly: if I took this away tomorrow, what would you do?</p>
<p><b>Fourth, you have not talked to enough people to know anything.</b> You are drawing conclusions from a tiny sample and you know it. A plan is: I will talk to 40 doctors in the next 3 weeks. Here is how I will reach them. Here is what I will ask. Here is how I will track what I learn. Here is the specific signal that tells me to keep going or stop. You need a system, not a vibe.</p>
<p><b>Fifth, stop averaging your cold call and in-person conversion rates.</b> In-person at 20% is solid. That tells me the product resonates when you can actually get in front of someone and explain it. Double down on what works. Go to every conference. Show up at every medical society dinner. Ask every friendly doctor for 3 introductions. Warm intros in healthcare are the entire game.</p>
<p><b>Sixth, the 50% close rate at PMF thing is not a universal law.</b> It is a heuristic and it varies wildly by industry, price point, and buyer type. Do not anchor on someone else's framework. Build your own based on what you are actually seeing.</p>
<p><b>Here is what I would tell you to do:</b></p>
<p>Stop building. Have 30 real conversations in the next 3 weeks. Not pitches. Conversations. Ask them what the worst part of their day is. Ask them what they wish existed. Do not mention your product for the first 15 minutes.</p>
<p>Get honest with your design partner. Ask the hard question. Record what he says, not what you hope he says.</p>
<p>Set a real decision criteria. Not &ldquo;I will decide this month.&rdquo; Something like: if fewer than 5 out of 30 doctors describe the problem I am solving as a top-3 pain point, I will pivot. Write it down before you start so you cannot move the goalposts.</p>
<p>If you do pivot, pivot toward the pain you hear most often in those 30 conversations. Do not pivot toward a new idea you had in the shower. Pivot toward evidence.</p>
<p>You are not out of the game. But you need to move faster, with more structure, and with less narrative-building around why it might not work.</p>
<p>Go talk to people.</p>
</div>

<div class="blog-post">
<div class="blog-post-title">Not Everyone is Going to Make It</div>
<div class="blog-post-date">March 4, 2026</div>
<div class="blog-post-body">
<p>Not everyone is going to make it, and that's okay.</p>
<p>I flew from Atlanta to Chicago to a trade show by myself to network in the industry. I got incredibly excited when I saw a company from the most famous startup incubator of all time, people like me, trying to start a company in healthcare. I was immediately drawn to their background and what got them started in the industry.</p>
<p>They were a group of incredibly start college grads that declined opportunities in corporate America to start their own business, founding their company in SF. My path while different was aligned with theirs and it felt like I was getting closer to creating a real network in the industry.</p>
<p>I could tell they were focused, and stressed. That's fine. I am too. I think the conference went well for them and we had great conversations, but they couldn't hang out in the evenings due to the pressure they were putting on themselves.</p>
<p>Since then, I have texted them a couple times but our communications have stopped.</p>
<p>I don't know if it's just me, but I tend to look people up when Im bored. Even their companies as well, that's why I had to delete social media I guess.</p>
<p>Today, they just pivoted. It looks like they are building in another vertical and I don't know how this makes me feel, for one I was excited to talk with other founders in this space but also does this mean this group of smart co-founders saw the opportunity or lack thereof and switched? How does this reflect on me? I worry that my stubbornness leads me down to the wrong path in building the product.</p>
<p>I also know that this is a marathon, as the barrier to becoming a software founder diminishes to a $20 Claude Code plan the ones that will be able to start a business won't be how smart and technical you are but on grit, taste, and execution.</p>
<p>I hope to see them at the next healthcare conference that they told me they would be attending. If not, I know that meeting them was still highly impactful for me, and I wish them the best of luck.</p>
</div>
</div>

<div class="blog-post">
<div class="blog-post-title">Difficult Conversations</div>
<div class="blog-post-date">March 5, 2026</div>
<div class="blog-post-body">
<p>The more difficult conversations you have the better your life will be.</p>
<p>There are two types of difficult conversations you can have, ones with yourself and ones with others. Joining the workforce after college allows you to have few difficult conversations, save for a salary negotiation or maybe an interview. That's comfortable, and fine for others. I am at a point where comfort is not what I am seeking, growth does not lie in comfort. It is on another plane. This week I have knocked on 10 doors of offices to show them my product and had one sales meeting.</p>
<p>The hardest question I have asked someone this year is if they would pay $x amount for my product, but I did it. Their answer is pivotal to my journey of starting a business. It has taken me a lot of time to understand that the answers to my company aren't going to be found at home. I tried to find them by solving problems while working in the family office. But, the best method is to talk to as many people you can.</p>
<p>Your customers will tell you their biggest problems. They will beg for you to make the solution and are waiting for you to say you have solved their problem in a certain way. Listening to them is the only way.</p>
<p>Difficult conversations are also found in personal life, I have neglected difficult conversations in relationships that I still regret. I also have struggled with difficult conversations with myself. Is what I am working on the right thing? Am I wasting my time?</p>
<p>I think accepting that I am shying away from the conversations is the first step. My next is to build a real framework to have mental model to face these conversations.</p>
<p>Now, I seek difficult conversations. Ive had two this week, next week, I'd like 5.</p>
<p>That is where I will find my real growth.</p>
</div>
</div>

<div class="blog-post">
<div class="blog-post-title">Petitions</div>
<div class="blog-post-date">March 7, 2026</div>
<div class="blog-post-body">
<p>After my time trying to start a company, and my trials and tribulations. I think I figured something out. Once again, I think. Starting a company is like those solicitors on a busy sidewalk with a petition in hand. Now that I moonlight as a solicitor sometime, I tend to cut them some slack.</p>
<p>As an early-stage founder, you are the solicitor. You should be the person with a petition in their hand. You are petitioning your future self to work on a project. Building a company, time is your most valuable asset because everyone has a timeline or a deadline for how long they'll be working on their business. You should make sure that when you are building out your company, you are spending your time on high-leverage activities.</p>
<p>This is incredibly important. I was listening to a podcast and in the podcast they're saying that before the startup, the build phase, there's a research phase. If you don't do the research phase well enough, you're going to be doing it anyways after you build the product, when you try to sell to customers.</p>
<p>I see what he's saying now because I'm in the research phase. Turns out that if you don't do enough research beforehand when pre-build, you will figure out whether or not this would be a real business after spending months building out the product.</p>
<p>This petition is an analogy for talking to customers. You are going to need to talk to customers and to ask them, &ldquo;Is this a problem you have?&rdquo; If so, will you sign this petition or will you sign this future work order to buy this product?</p>
<p>After going into over 10 offices this past week, I found that this is the best way because you can directly go to your customer with mock-ups of the product and if they tell you that they will buy this next week and you make up some kind of reason that it actually can't be done next week, then you build a product.</p>
<p>I know this sounds antithetical to a startup where you want to build an MVP and ship it fast but at least this gives a lot more clarity on what to work on.</p>
<p>Ben</p>
</div>
</div>

<div class="blog-post">
<div class="blog-post-title">Scientific Experiments</div>
<div class="blog-post-date">March 8, 2026</div>
<div class="blog-post-body">
<p>Evaluating a startup is emotionally taxing. I have worked on a product for months, and am trying to sell it now. There is a lot of emotion involved.</p>
<p>Emotion won't get you customers, or Product Market Fit. I have to be tactical with my decisions.</p>
<p>I want to be as objective as possible, so I wanted to use one of the most objective techniques I have ever used. The scientific method.</p>
<p>Building a business is an extension of the scientific method. Usually, someone has an idea and they want to test it in the market. Structuring my startup like this makes my decision making process more objective than looking back at December, January and February as months of me building a product and now I am trying to sell it.</p>
<p>That brings emotion into the equation.</p>
<p>My scientific method went generally like this:</p>
<ol>
<li><b>Ask a Question.</b>
<ul>
<li>Is this a problem people would pay to have solved</li>
<li>How many people would pay to have it solved</li>
<li>Is this a business</li>
</ul>
</li>
<li><b>Hypothesis</b><br>I believe that X customer that has Y problem would pay Z amount.</li>
<li><b>Test with an experiment</b><br>Can you speak to X users and would they pay? If it&rsquo;s hard to find these users what does that mean?</li>
<li><b>Procedure working</b><br>Can you make a living salary off of this business?</li>
<li><b>Analyze data and make conclusions</b><br>Come up with conclusions and make your decision.</li>
</ol>
</div>
</div>

</div>`;
